name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: xvfb-run --auto-servernum -- npx playwright test
      - name: Generate Allure report
        run: npx allure generate allure-results --clean --output allure-report
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Zip reports for email attachment
        run: |
          zip -r report-archive.zip allure-report playwright-report

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.example.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Playwright + Allure report: ${{ job.status }}"
          to: team@example.com
          from: ci@example.com
          content_type: text/html
          body: |
            <p>✅ Playwright + Allure job completed: <strong>${{ job.status }}</strong>.</p>
            <p>Run: <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">${{ github.run_id }}</a></p>
            <ul>
              <li>Playwright: <em>playwright-report</em></li>
              <li>Allure: <em>allure-report</em></li>
            </ul>
          attachments: report-archive.zip
